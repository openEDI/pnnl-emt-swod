name: TestPNNLDOPFADMM

on:
  push:
    paths:
      - 'Components/**'
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.13']

    steps:
    - uses: actions/checkout@v2
    - name: Set up Python ${{ matrix.python-version }}
      uses: conda-incubator/setup-miniconda@v2
      with:
        auto-update-conda: true
        python-version: ${{ matrix.python-version }}
    - name: Install component dependencies
      shell: bash -l {0}
      run: |
        pip install -e Components/broker \
                    -e Components/LocalFeeder \
                    -e Components/recorder \
                    -e Components/pnnl_admm_federate \
                    -e Components/pnnl_hub_voltage \
                    -e Components/pnnl_hub_power \
                    -e Components/pnnl_hub_control \

        pip install plotille
        pip install click
    - name: Run example
      shell: bash -l {0}
      run: |
        oedisi build --system scenarios/pnnl_dopf_admm.json
        oedisi run
    - name: Archive logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test_logs
        path: |
          build/*.log
